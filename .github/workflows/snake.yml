name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub Contribution Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: tanvirjahanshakib
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=%23a855f7&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23a855f7&color_dots=%230d1117,%23161b22,%2321252d,%23303d4a,%2339d353

      - name: Deploy Snake
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
